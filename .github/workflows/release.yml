name: Build Verification

on:
  push:
    branches:
      - main
      - dev
      - feat/**
  pull_request:
  workflow_dispatch:

jobs:
  build-verify:
    runs-on: windows-latest

    steps:
      - name: Checkout dgh-HealthCraft
        uses: actions/checkout@v4
        with:
          path: dgh-HealthCraft

      - name: Checkout dontgethurt dependency
        uses: actions/checkout@v4
        with:
          repository: LAST-iMP/dontgethurt
          path: dontgethurt

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle build
        working-directory: dgh-HealthCraft
        run: .\gradlew --no-daemon clean build