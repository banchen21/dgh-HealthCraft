name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout dgh-HealthCraft
        uses: actions/checkout@v4
        with:
          path: dgh-HealthCraft

      - name: Checkout dontgethurt dependency
        uses: actions/checkout@v4
        with:
          repository: LAST-iMP/dontgethurt
          path: dontgethurt

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Read mod version
        id: mod_version
        run: |
          echo "MOD_VERSION=$(grep '^mod_version=' dgh-HealthCraft/gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${GITHUB_REF_NAME:-$MOD_VERSION}" >> $GITHUB_ENV

      - name: Gradle build
        working-directory: dgh-HealthCraft
        run: .\gradlew --no-daemon clean build

      - name: Collect artifact
        working-directory: dgh-HealthCraft
        run: |
          set -e
          artifactPath=$(powershell -NoLogo -NoProfile -Command "Get-ChildItem -Path build/libs -Filter '*.jar' | Select-Object -First 1 -ExpandProperty FullName")
          echo "artifact_path=$artifactPath" >> $GITHUB_ENV
          echo "artifact_name=$(powershell -NoLogo -NoProfile -Command \"Split-Path -Path '$artifactPath' -Leaf\")" >> $GITHUB_ENV

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name != '' && github.ref_name || env.RELEASE_VERSION }}
          release_name: ${{ github.ref_name != '' && github.ref_name || env.RELEASE_VERSION }}
          body: 'Automated build artifact from gradle build.'
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload mod artifact to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.artifact_path }}
          asset_name: ${{ env.artifact_name }}
          asset_content_type: application/java-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
